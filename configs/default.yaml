project:
  name: "mamba_360_ghost_futures"
  seed: 42
  device: "auto"

data:
  cache_dir: "data/raw"
  processed_dir: "data/processed"
  use_open_data: true
  max_matches: null
  require_360: true
  min_events_per_match: 100
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15

features:
  pitch_length: 120.0
  pitch_width: 80.0
  zone_x_bins: 12
  zone_y_bins: 8
  context_length: 20
  future_horizon: 5
  turnover_horizon: 3
  use_360_features: true
  use_player_id: true
  use_team_id: true

model:
  backend: "auto"
  d_model: 128
  num_layers: 2
  dropout: 0.1
  categorical_embedding_dim: 32
  continuous_hidden_dim: 128

training:
  epochs: 5
  batch_size: 64
  lr: 0.0005
  weight_decay: 0.0001
  num_workers: 0
  grad_clip_norm: 1.0
  checkpoint_dir: "outputs/checkpoints"

loss:
  action_weight: 1.0
  zone_weight: 1.0
  outcome_weight: 0.5
  shot_next_5_weight: 0.8
  turnover_next_3_weight: 0.8

generation:
  rollout_steps: 5
  num_samples: 30
  temperature: 0.9
  top_k: 5
  stop_on_terminal_event: true

visualization:
  output_dir: "outputs/case_studies"
  figure_dpi: 180
  show_visible_area: true
  max_ghost_futures_to_draw: 12
